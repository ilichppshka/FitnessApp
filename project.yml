name: FitnesApp
options:
  bundleIdPrefix: com.ilich
  deploymentTarget:
    iOS: "18.6"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  FitnesApp:
    type: application
    platform: iOS
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: KINETIK_logo_v2
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    sources:
      - path: FitnesApp
        excludes:
          - "Tests/**"
          - "DesignSystemApp/**"
    resources:
      - FitnesApp/Resources
    info:
      path: FitnesApp/Resources/Info.plist
      properties:
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        NSUserNotificationsUsageDescription: "Notification when the rest timer ends"
        UIAppFonts:
          - SpaceGrotesk-Bold.ttf
          - SpaceGrotesk-Medium.ttf

  FitnesAppDS:
    type: application
    platform: iOS
    sources:
      - path: FitnesApp/DesignSystem
      - path: FitnesApp/DesignSystemApp
        excludes:
          - "Info.plist"
    info:
      path: FitnesApp/DesignSystemApp/Info.plist
      properties:
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UIAppFonts:
          - SpaceGrotesk-Bold.ttf
          - SpaceGrotesk-Medium.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ilich.FitnesAppDS
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) DESIGN_SYSTEM_APP
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    preBuildScripts:
      - name: Copy SpaceGrotesk Fonts
        script: |
          cp "${SRCROOT}/FitnesApp/Resources/Fonts/SpaceGrotesk-Bold.ttf" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/SpaceGrotesk-Bold.ttf"
          cp "${SRCROOT}/FitnesApp/Resources/Fonts/SpaceGrotesk-Medium.ttf" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/SpaceGrotesk-Medium.ttf"
        inputFiles:
          - $(SRCROOT)/FitnesApp/Resources/Fonts/SpaceGrotesk-Bold.ttf
          - $(SRCROOT)/FitnesApp/Resources/Fonts/SpaceGrotesk-Medium.ttf
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/SpaceGrotesk-Bold.ttf
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/SpaceGrotesk-Medium.ttf

  FitnesAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FitnesApp/Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - target: FitnesApp
